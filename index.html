<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDraw AI - 纯语音控制AI绘图工具</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eee;
            --text-secondary: #aab;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --border: #2a2a4a;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ===== Header ===== */
        .header {
            background: var(--panel-bg);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 1.4em;
            font-weight: 700;
            background: linear-gradient(135deg, #e94560, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* ===== Main Layout ===== */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }
        .panel h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* ===== Mic Button ===== */
        .mic-section {
            text-align: center;
        }
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--border);
            background: var(--accent);
            color: #fff;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .mic-btn:hover {
            border-color: var(--highlight);
            box-shadow: 0 0 20px rgba(233,69,96,0.3);
        }
        .mic-btn.listening {
            border-color: var(--success);
            background: #1a4a2e;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 30px rgba(46,204,113,0.5);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(46,204,113,0.3); }
            50% { box-shadow: 0 0 30px rgba(46,204,113,0.7); }
        }
        .mic-status {
            font-size: 0.85em;
            margin-top: 8px;
            color: var(--text-secondary);
        }
        .mic-status .dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--danger);
            margin-right: 6px;
        }
        .mic-status .dot.active { background: var(--success); }

        /* ===== Command Log ===== */
        .command-log {
            flex: 1;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.82em;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }
        .command-log .entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .command-log .entry .icon { flex-shrink: 0; }
        .command-log .entry.success .icon { color: var(--success); }
        .command-log .entry.error .icon { color: var(--danger); }
        .command-log .entry.warn .icon { color: var(--warning); }

        /* ===== Toolbar ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tool-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            cursor: pointer;
            font-size: 0.82em;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tool-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--highlight);
        }
        .tool-btn.danger { border-color: var(--danger); color: var(--danger); }
        .tool-btn.danger:hover { background: rgba(231,76,60,0.15); }

        /* ===== Color Picker ===== */
        .color-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .color-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-dot:hover, .color-dot.active {
            border-color: #fff;
            transform: scale(1.15);
        }

        /* ===== Canvas Area ===== */
        .canvas-area {
            flex: 1;
            position: relative;
            background:
                radial-gradient(circle at 20% 30%, rgba(233,69,96,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(243,156,18,0.05) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .canvas-wrapper {
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border-radius: 4px;
            background: #fff;
        }
        canvas {
            display: block;
            border-radius: 4px;
            cursor: crosshair;
        }

        /* ===== Voice Overlay ===== */
        .voice-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1.1em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
            max-width: 90%;
            text-align: center;
        }
        .voice-overlay.show {
            opacity: 1;
        }

        /* ===== Status Bar ===== */
        .status-bar {
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
            padding: 6px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78em;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-value {
            color: var(--text);
            font-weight: 600;
        }

        /* ===== AI Panel ===== */
        .ai-placeholder {
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 12px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-top: auto;
        }
        .ai-placeholder .badge {
            display: inline-block;
            background: var(--accent);
            color: var(--text);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-bottom: 6px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .main-container { flex-direction: column-reverse; }
            .sidebar { width: 100%; max-height: 40vh; flex-shrink: 1; }
            .canvas-area { flex: 1; min-height: 300px; }
            canvas { max-width: 100%; max-height: 100%; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div>
            <span class="logo">🎙️ VoiceDraw AI</span>
            <span class="subtitle"> — 纯语音控制AI绘图工具</span>
        </div>
        <div style="font-size:0.8em;color:var(--text-secondary);">
            v1.0.0 | 浏览器语音API驱动
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <!-- Microphone -->
            <div class="panel mic-section">
                <h3>🎤 语音控制</h3>
                <button class="mic-btn" id="micBtn" title="点击开始/停止语音识别">🎙️</button>
                <div class="mic-status">
                    <span class="dot" id="micDot"></span>
                    <span id="micLabel">点击麦克风开始</span>
                </div>
            </div>

            <!-- Quick Tools -->
            <div class="panel">
                <h3>🔧 快捷操作</h3>
                <div class="toolbar">
                    <button class="tool-btn" onclick="executeCommand({action:'undo'})" title="撤销上一步">↩ 撤销</button>
                    <button class="tool-btn" onclick="executeCommand({action:'clear'})" title="清空画布">🗑 清空</button>
                    <button class="tool-btn" onclick="executeCommand({action:'reset'})" title="恢复默认设置">🔄 重置</button>
                    <button class="tool-btn danger" onclick="exportCanvas()" title="导出为PNG图片">💾 导出</button>
                </div>
            </div>

            <!-- Color Presets -->
            <div class="panel">
                <h3>🎨 当前颜色: <span id="currentColorLabel" style="color:#e94560;">红色</span></h3>
                <div class="color-presets" id="colorPresets"></div>
                <div style="margin-top:8px;font-size:0.8em;color:var(--text-secondary);">
                    线宽: <span id="lineWidthLabel" style="color:var(--text);">3px</span>
                    &nbsp;|&nbsp;
                    模式: <span id="drawModeLabel" style="color:var(--text);">自由绘制</span>
                </div>
            </div>

            <!-- Command Log -->
            <div class="panel">
                <h3>📋 指令记录</h3>
                <div class="command-log" id="commandLog">
                    <div style="color:var(--text-secondary);">等待语音指令...</div>
                </div>
            </div>

            <!-- AI Placeholder -->
            <div class="ai-placeholder">
                <span class="badge">🔮 预留接口</span>
                <br>AI文生图模块 — 后续迭代接入
                <br><small>API: POST /api/generate-image</small>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area" id="canvasArea">
            <div class="canvas-wrapper">
                <canvas id="drawCanvas"></canvas>
            </div>
            <div class="voice-overlay" id="voiceOverlay"></div>
        </main>

    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-indicator">
            <span class="status-item">🎤 识别: <span class="status-value" id="statusRecog">待机</span></span>
            <span class="status-item">📐 图形: <span class="status-value" id="statusShapes">0</span></span>
            <span class="status-item">📝 指令: <span class="status-value" id="statusCmds">0</span></span>
        </div>
        <div>
            💡 说 "<strong>帮助</strong>" 查看所有可用指令
        </div>
    </footer>

    <script>
    // =====================================================================
    //  VoiceDraw AI — 纯语音控制AI绘图工具
    //  所有代码均为原创实现，基于浏览器原生API
    // =====================================================================

    // =========================== 全局状态 ===========================
    const STATE = {
        // 绘图状态
        currentColor: '#e94560',
        currentLineWidth: 3,
        drawMode: 'freehand',     // 'freehand' | 'line' | 'circle' | 'rectangle' | 'fill' | 'erase'
        isDrawing: false,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,

        // 画布历史（用于撤销）
        undoStack: [],
        maxUndo: 50,

        // 语音状态
        isListening: false,
        recognition: null,
        synthesis: window.speechSynthesis,

        // 统计
        shapeCount: 0,
        commandCount: 0,

        // AI接口预留
        aiEndpoint: '',  // 后续填入API地址
    };

    // =========================== DOM引用 ===========================
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const micBtn = document.getElementById('micBtn');
    const micDot = document.getElementById('micDot');
    const micLabel = document.getElementById('micLabel');
    const voiceOverlay = document.getElementById('voiceOverlay');
    const commandLog = document.getElementById('commandLog');
    const currentColorLabel = document.getElementById('currentColorLabel');
    const lineWidthLabel = document.getElementById('lineWidthLabel');
    const drawModeLabel = document.getElementById('drawModeLabel');
    const colorPresets = document.getElementById('colorPresets');

    // =========================== 画布初始化 ===========================
    function initCanvas() {
        const wrapper = canvas.parentElement;
        const area = document.getElementById('canvasArea');
        const maxW = area.clientWidth - 60;
        const maxH = area.clientHeight - 60;

        // 使用固定绘图区域尺寸
        canvas.width = Math.min(900, maxW);
        canvas.height = Math.min(600, maxH);

        // 初始白色背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 默认设置
        ctx.strokeStyle = STATE.currentColor;
        ctx.fillStyle = STATE.currentColor;
        ctx.lineWidth = STATE.currentLineWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // 保存初始状态
        saveSnapshot();
    }

    // =========================== 撤销栈 ===========================
    function saveSnapshot() {
        const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        STATE.undoStack.push(snapshot);
        if (STATE.undoStack.length > STATE.maxUndo) {
            STATE.undoStack.shift();
        }
        document.getElementById('statusShapes').textContent = STATE.undoStack.length - 1;
    }

    function undo() {
        if (STATE.undoStack.length > 1) {
            STATE.undoStack.pop(); // 丢弃当前状态
            const prev = STATE.undoStack[STATE.undoStack.length - 1];
            ctx.putImageData(prev, 0, 0);
            updateStatus();
            return true;
        }
        return false;
    }

    function clearCanvas() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveSnapshot();
        STATE.shapeCount = 0;
        updateStatus();
    }

    function resetAll() {
        STATE.currentColor = '#e94560';
        STATE.currentLineWidth = 3;
        STATE.drawMode = 'freehand';
        ctx.strokeStyle = STATE.currentColor;
        ctx.fillStyle = STATE.currentColor;
        ctx.lineWidth = STATE.currentLineWidth;
        clearCanvas();
        updateColorUI();
        updateStyleUI();
    }

    function updateStatus() {
        document.getElementById('statusShapes').textContent =
            Math.max(0, STATE.undoStack.length - 1);
        document.getElementById('statusCmds').textContent = STATE.commandCount;
    }

    // =========================== 绘图操作 ===========================
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY,
        };
    }

    function startDraw(e) {
        const pos = getCanvasPos(e);
        STATE.isDrawing = true;
        STATE.startX = pos.x;
        STATE.startY = pos.y;
        STATE.lastX = pos.x;
        STATE.lastY = pos.y;

        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);

        // 填充模式：直接执行
        if (STATE.drawMode === 'fill') {
            floodFill(Math.round(pos.x), Math.round(pos.y), STATE.currentColor);
            STATE.isDrawing = false;
            saveSnapshot();
            STATE.shapeCount++;
            updateStatus();
        }
    }

    function draw(e) {
        if (!STATE.isDrawing) return;
        const pos = getCanvasPos(e);

        if (STATE.drawMode === 'freehand' || STATE.drawMode === 'erase') {
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            STATE.lastX = pos.x;
            STATE.lastY = pos.y;
        } else if (STATE.drawMode === 'line') {
            // 预览模式：重绘临时线
            // 简化处理：在move时实时绘制
            const snap = STATE.undoStack[STATE.undoStack.length - 1];
            if (snap) ctx.putImageData(snap, 0, 0);
            ctx.beginPath();
            ctx.moveTo(STATE.startX, STATE.startY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        } else if (STATE.drawMode === 'circle') {
            const snap = STATE.undoStack[STATE.undoStack.length - 1];
            if (snap) ctx.putImageData(snap, 0, 0);
            const rx = Math.abs(pos.x - STATE.startX) / 2;
            const ry = Math.abs(pos.y - STATE.startY) / 2;
            const cx = (STATE.startX + pos.x) / 2;
            const cy = (STATE.startY + pos.y) / 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.stroke();
        } else if (STATE.drawMode === 'rectangle') {
            const snap = STATE.undoStack[STATE.undoStack.length - 1];
            if (snap) ctx.putImageData(snap, 0, 0);
            const w = pos.x - STATE.startX;
            const h = pos.y - STATE.startY;
            ctx.beginPath();
            ctx.rect(STATE.startX, STATE.startY, w, h);
            ctx.stroke();
        }
    }

    function endDraw(e) {
        if (!STATE.isDrawing) return;
        STATE.isDrawing = false;
        const pos = getCanvasPos(e);

        // 恢复快照并绘制最终图形
        if (STATE.drawMode !== 'freehand' && STATE.drawMode !== 'erase') {
            const snap = STATE.undoStack[STATE.undoStack.length - 1];
            if (snap) ctx.putImageData(snap, 0, 0);

            ctx.beginPath();
            if (STATE.drawMode === 'line') {
                ctx.moveTo(STATE.startX, STATE.startY);
                ctx.lineTo(pos.x, pos.y);
            } else if (STATE.drawMode === 'circle') {
                const rx = Math.abs(pos.x - STATE.startX) / 2;
                const ry = Math.abs(pos.y - STATE.startY) / 2;
                const cx = (STATE.startX + pos.x) / 2;
                const cy = (STATE.startY + pos.y) / 2;
                ctx.ellipse(cx, cy, rx || 1, ry || 1, 0, 0, Math.PI * 2);
            } else if (STATE.drawMode === 'rectangle') {
                const w = pos.x - STATE.startX;
                const h = pos.y - STATE.startY;
                ctx.rect(STATE.startX, STATE.startY, w, h);
            }
            ctx.stroke();
        }

        saveSnapshot();
        STATE.shapeCount++;
        updateStatus();
    }

    // =========================== 洪水填充 ===========================
    function floodFill(startX, startY, fillColorHex) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width;
        const h = canvas.height;

        const targetIdx = (startY * w + startX) * 4;
        const targetR = data[targetIdx];
        const targetG = data[targetIdx + 1];
        const targetB = data[targetIdx + 2];
        const targetA = data[targetIdx + 3];

        // 解析填充颜色
        const tempCtx = document.createElement('canvas').getContext('2d');
        tempCtx.fillStyle = fillColorHex;
        tempCtx.fillRect(0, 0, 1, 1);
        const fillData = tempCtx.getImageData(0, 0, 1, 1).data;
        const fillR = fillData[0];
        const fillG = fillData[1];
        const fillB = fillData[2];

        // 颜色容差
        const tolerance = 32;
        function match(idx) {
            return Math.abs(data[idx] - targetR) <= tolerance &&
                   Math.abs(data[idx + 1] - targetG) <= tolerance &&
                   Math.abs(data[idx + 2] - targetB) <= tolerance &&
                   Math.abs(data[idx + 3] - targetA) <= tolerance;
        }

        // 如果目标颜色与填充颜色相同，跳过
        if (Math.abs(targetR - fillR) <= 2 &&
            Math.abs(targetG - fillG) <= 2 &&
            Math.abs(targetB - fillB) <= 2) {
            return;
        }

        const stack = [[startX, startY]];
        const visited = new Uint8Array(w * h);
        const maxStack = w * h;

        while (stack.length > 0 && stack.length < maxStack) {
            const [x, y] = stack.pop();
            const idx = (y * w + x) * 4;

            if (x < 0 || x >= w || y < 0 || y >= h) continue;
            if (visited[y * w + x]) continue;
            if (!match(idx)) continue;

            visited[y * w + x] = 1;
            data[idx] = fillR;
            data[idx + 1] = fillG;
            data[idx + 2] = fillB;
            data[idx + 3] = 255;

            stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
        }

        ctx.putImageData(imageData, 0, 0);
    }

    // =========================== 鼠标事件（保留作为备用交互） ===========================
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // 触摸事件
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startDraw(e.touches[0]);
    });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        draw(e.touches[0]);
    });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        endDraw(e.changedTouches[0]);
    });

    // =========================== 语音识别模块 ===========================
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showVoiceOverlay('⚠️ 您的浏览器不支持语音识别，请使用Chrome浏览器', 'error');
            micBtn.disabled = true;
            micLabel.textContent = '浏览器不支持语音识别';
            return null;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;       // 持续识别
        recognition.interimResults = true;   // 返回中间结果
        recognition.maxAlternatives = 3;     // 多个候选结果

        recognition.onstart = () => {
            STATE.isListening = true;
            micBtn.classList.add('listening');
            micBtn.textContent = '🔴';
            micDot.classList.add('active');
            micLabel.textContent = '正在聆听...';
            document.getElementById('statusRecog').textContent = '聆听中';
            addLogEntry('🎤', '语音识别已启动', 'success');
        };

        recognition.onend = () => {
            STATE.isListening = false;
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎙️';
            micDot.classList.remove('active');
            micLabel.textContent = '点击麦克风开始';
            document.getElementById('statusRecog').textContent = '待机';

            // 自动重启（持续监听模式）
            if (STATE.isListening === false && micBtn.dataset.autoRestart === 'true') {
                setTimeout(() => {
                    if (!STATE.isListening && micBtn.dataset.autoRestart === 'true') {
                        try { recognition.start(); } catch(e) {}
                    }
                }, 300);
            }
        };

        recognition.onerror = (event) => {
            console.warn('语音识别错误:', event.error, event.message);
            let msg = '识别出错';
            switch(event.error) {
                case 'no-speech': msg = '未检测到语音'; break;
                case 'audio-capture': msg = '无法访问麦克风'; break;
                case 'not-allowed': msg = '麦克风权限被拒绝'; break;
                case 'network': msg = '网络连接错误'; break;
                case 'aborted': return; // 静默处理
                default: break;
            }
            if (event.error !== 'aborted') {
                addLogEntry('⚠️', msg, 'error');
                document.getElementById('statusRecog').textContent = '错误';
            }
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            let interimTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const result = event.results[i];
                if (result.isFinal) {
                    finalTranscript += result[0].transcript;
                } else {
                    interimTranscript += result[0].transcript;
                }
            }

            // 显示中间结果
            if (interimTranscript) {
                showVoiceOverlay(interimTranscript, 'interim');
            }

            // 处理最终结果
            if (finalTranscript) {
                // 尝试多个候选以提高准确率
                const alternatives = event.results[event.results.length - 1];
                const candidates = [];
                for (let i = 0; i < alternatives.length; i++) {
                    candidates.push(alternatives[i].transcript.trim());
                }

                const best = candidates[0];
                showVoiceOverlay('✅ ' + best, 'final');
                addLogEntry('🗣', best, 'success');
                parseAndExecute(best, candidates);
                STATE.commandCount++;
                updateStatus();
            }
        };

        return recognition;
    }

    function parseAndExecute(text, alternatives = []) {
        const raw = text.trim();
        if (!raw) return;

        let matched = false;

        // 尝试匹配所有已知模式
        for (const pattern of COMMAND_PATTERNS) {
            for (const kw of pattern.keywords) {
                if (raw.includes(kw)) {
                    pattern.handler({ raw, alternatives, matchedKeyword: kw });
                    matched = true;
                    break;
                }
            }
            if (matched) break;
        }

        // 未匹配时的容错处理
        if (!matched) {
            // 尝试模糊匹配：检查是否包含部分关键词
            const allKeywords = COMMAND_PATTERNS.flatMap(p => p.keywords);
            let bestMatch = null;
            let bestScore = 0;

            for (const kw of allKeywords) {
                const score = fuzzyMatch(raw, kw);
                if (score > bestScore && score > 0.4) {
                    bestScore = score;
                    bestMatch = kw;
                }
            }

            if (bestMatch) {
                // 找到模糊匹配，尝试执行对应命令
                for (const pattern of COMMAND_PATTERNS) {
                    if (pattern.keywords.includes(bestMatch)) {
                        pattern.handler({ raw, alternatives, matchedKeyword: bestMatch, fuzzy: true });
                        addLogEntry('🔍', `模糊匹配: "${raw}" → "${bestMatch}"`, 'warn');
                        matched = true;
                        break;
                    }
                }
            }
        }

        if (!matched) {
            speakFeedback('抱歉，我没有理解这个指令，请说"帮助"查看可用指令');
            addLogEntry('❌', `未识别: "${raw}"`, 'error');
            showVoiceOverlay('❌ 未识别: "' + raw + '"', 'final');
        }

        return matched;
    }

    // 简单的模糊匹配（字符重叠度）
    function fuzzyMatch(input, target) {
        const inputChars = new Set(input.split(''));
        const targetChars = new Set(target.split(''));
        let overlap = 0;
        for (const c of inputChars) {
            if (targetChars.has(c)) overlap++;
        }
        return overlap / Math.max(inputChars.size, targetChars.size);
    }

    /**
     * AI文生图模块 — 预留接口
     *
     * 计划接入方式：
     * 1. 设置 STATE.aiEndpoint 为实际的API地址
     * 2. 用户说"AI画一只猫"时触发
     * 3. 调用API获取生成的图片
     * 4. 将图片绘制到画布上
     *
     * @param {string} prompt - 用户描述的文字提示词
     * @returns {Promise<ImageData|null>}
     */
    async function aiGenerateImage(prompt) {
        if (!STATE.aiEndpoint) {
            speakFeedback('AI文生图功能尚未配置API接口');
            addLogEntry('🔮', 'AI接口未配置 — 请设置API地址', 'warn');
            return null;
        }

        try {
            addLogEntry('🔮', 'AI生成中: ' + prompt, 'success');
            showVoiceOverlay('🤖 AI正在生成: ' + prompt, 'final');

            const response = await fetch(STATE.aiEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, size: `${canvas.width}x${canvas.height}` }),
            });

            if (!response.ok) throw new Error('API请求失败: ' + response.status);

            const data = await response.json();
            // 预期返回 { imageUrl: '...' } 或 { imageBase64: '...' }
            const imageUrl = data.imageUrl || data.image_base64;

            if (imageUrl) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = imageUrl;
                });
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                saveSnapshot();
                speakFeedback('AI图片已生成并绘制到画布');
                addLogEntry('🤖', 'AI图片生成成功', 'success');
            }

            return data;
        } catch (err) {
            console.error('AI生成失败:', err);
            speakFeedback('AI图片生成失败，请稍后再试');
            addLogEntry('❌', 'AI生成失败: ' + err.message, 'error');
            return null;
        }
    }

    function init() {
        initCanvas();
        buildColorPresets();
        STATE.recognition = initSpeechRecognition();

        // 欢迎提示
        setTimeout(() => {
            speakFeedback('欢迎使用VoiceDraw AI，点击麦克风按钮开始语音绘图');
            addLogEntry('🚀', 'VoiceDraw AI 已就绪 — 点击🎙️开始', 'success');
            addLogEntry('💡', '说"帮助"查看所有指令', 'success');
        }, 500);
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', init);

    console.log('🎙️ VoiceDraw AI v1.0.0 已加载');
    console.log('📋 支持指令: 画直线 | 画圆 | 画矩形 | 自由画 | 填充 | 擦除 | 颜色切换 | 加粗/变细 | 撤销 | 清空 | 重置 | 导出');
    console.log('🔮 AI文生图接口预留: STATE.aiEndpoint');
    console.log('💡 所有代码基于浏览器原生API实现，零外部依赖');
    </script>
